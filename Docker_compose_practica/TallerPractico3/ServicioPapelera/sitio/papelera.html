<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Papelera - Sistema de Notas</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
</head>
<body class="bg-light">

    <nav class="navbar navbar-expand-lg navbar-dark bg-secondary shadow-sm">
        <div class="container">
            <span class="navbar-brand fw-bold">
                <i class="bi bi-trash3-fill me-2"></i>Papelera de Reciclaje
            </span>
            <div class="d-flex gap-2">
                <a href="http://localhost:8082/notas.html" class="btn btn-outline-light btn-sm fw-semibold">
                    <i class="bi bi-arrow-left me-1"></i> Volver a Notas
                </a>
                <a href="http://localhost:8081/login.html" class="btn btn-light btn-sm fw-semibold text-secondary">Salir</a>
            </div>
        </div>
    </nav>

    <div class="container py-5">
        
        <div class="d-flex justify-content-between align-items-center mb-4 border-bottom pb-3">
            <div>
                <h2 class="fw-bold text-dark mb-0">Notas Eliminadas</h2>
                <p class="text-muted mb-0 small mt-1">Las notas aquí se eliminarán permanentemente según lo programado por el servicio.</p>
            </div>
            <button class="btn btn-danger fw-semibold shadow-sm rounded-pill px-4">
                <i class="bi bi-exclamation-triangle me-1"></i> Vaciar Papelera
            </button>
        </div>

        <div class="row g-4">
            
            <div class="col-12 col-md-6 col-lg-4">
                <div class="card h-100 border-danger border-opacity-25 shadow-sm rounded-4 bg-white opacity-75">
                    <div class="card-body">
                        <div class="d-flex justify-content-between align-items-start mb-2">
                            <h5 class="card-title fw-bold text-secondary text-decoration-line-through">Ideas de Proyecto</h5>
                            <span class="badge bg-danger rounded-pill">Eliminada</span>
                        </div>
                        <h6 class="card-subtitle mb-2 text-muted pb-2 border-bottom"><small>Eliminada el: 17 de Marzo, 2026</small></h6>
                        <p class="card-text text-secondary pt-2 fst-italic">Aplicación del clima, clon de Spotify, sistema de notas...</p>
                    </div>
                    <div class="card-footer bg-transparent border-0 d-flex justify-content-between pb-3 px-3">
                        <button class="btn btn-outline-success btn-sm rounded-3 fw-semibold">
                            <i class="bi bi-arrow-counterclockwise me-1"></i> Restaurar
                        </button>
                        <button class="btn btn-outline-danger btn-sm rounded-3" title="Eliminar para siempre">
                            <i class="bi bi-x-lg"></i>
                        </button>
                    </div>
                </div>
            </div>

            <div class="col-12 col-md-6 col-lg-4">
                <div class="card h-100 border-0 shadow-sm rounded-4 bg-transparent border border-2 border-dashed">
                    <div class="card-body d-flex flex-column align-items-center justify-content-center text-muted py-5">
                        <i class="bi bi-wind display-4 mb-2 opacity-50"></i>
                        <h6 class="fw-semibold opacity-75">No hay más notas eliminadas</h6>
                    </div>
                </div>
            </div>

        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
