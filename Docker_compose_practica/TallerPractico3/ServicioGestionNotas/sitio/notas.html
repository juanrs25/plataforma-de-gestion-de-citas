<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestión de Notas - Taller 3</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
</head>
<body class="bg-light">

    <nav class="navbar navbar-expand-lg navbar-dark bg-primary shadow-sm">
        <div class="container">
            <span class="navbar-brand fw-bold">
                <i class="bi bi-journal-text me-2"></i>Sistema de Notas
            </span>
            <div class="d-flex">
                <span class="navbar-text text-white me-3 d-none d-md-block">
                    Hola, Usuario
                </span>
                <a href="http://localhost:8081/login.html" class="btn btn-outline-light btn-sm fw-semibold">Salir</a>
            </div>
        </div>
    </nav>

    <div class="container py-5">
        
        <div class="d-flex justify-content-between align-items-center mb-4 border-bottom pb-3">
            <h2 class="fw-bold text-dark mb-0">Mis Notas</h2>
            <button class="btn btn-success fw-semibold shadow-sm rounded-pill px-4">
                <i class="bi bi-plus-lg me-1"></i> Nueva Nota
            </button>
        </div>

        <div class="row g-4">
            
            <div class="col-12 col-md-6 col-lg-4">
                <div class="card h-100 border-0 shadow-sm rounded-4">
                    <div class="card-body">
                        <h5 class="card-title fw-bold text-primary">Arquitectura Docker</h5>
                        <h6 class="card-subtitle mb-2 text-muted pb-2 border-bottom"><small>19 de Marzo, 2026</small></h6>
                        <p class="card-text text-secondary pt-2">Revisar los servicios de Nginx, asegurar la conexión con Node.js y levantar la base de datos MySQL.</p>
                    </div>
                    <div class="card-footer bg-transparent border-0 d-flex justify-content-end gap-2 pb-3 pe-3">
                        <button class="btn btn-outline-primary btn-sm rounded-3" title="Editar">
                            <i class="bi bi-pencil-square"></i>
                        </button>
                        <button class="btn btn-outline-danger btn-sm rounded-3" title="Mover a papelera">
                            <i class="bi bi-trash3"></i>
                        </button>
                    </div>
                </div>
            </div>

            <div class="col-12 col-md-6 col-lg-4">
                <div class="card h-100 border-0 shadow-sm rounded-4">
                    <div class="card-body">
                        <h5 class="card-title fw-bold text-primary">Lista de Compras</h5>
                        <h6 class="card-subtitle mb-2 text-muted pb-2 border-bottom"><small>18 de Marzo, 2026</small></h6>
                        <p class="card-text text-secondary pt-2">Café, pan, leche y cosas para el fin de semana.</p>
                    </div>
                    <div class="card-footer bg-transparent border-0 d-flex justify-content-end gap-2 pb-3 pe-3">
                        <button class="btn btn-outline-primary btn-sm rounded-3">
                            <i class="bi bi-pencil-square"></i>
                        </button>
                        <button class="btn btn-outline-danger btn-sm rounded-3">
                            <i class="bi bi-trash3"></i>
                        </button>
                    </div>
                </div>
            </div>

            <div class="col-12 col-md-6 col-lg-4">
                <div class="card h-100 border-0 shadow-sm rounded-4 bg-white opacity-75" style="border: 2px dashed #dee2e6 !important; cursor: pointer;">
                    <div class="card-body d-flex flex-column align-items-center justify-content-center text-muted">
                        <i class="bi bi-plus-circle display-4 mb-2 text-primary"></i>
                        <h5 class="fw-semibold">Crear nueva nota</h5>
                    </div>
                </div>
            </div>

        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
