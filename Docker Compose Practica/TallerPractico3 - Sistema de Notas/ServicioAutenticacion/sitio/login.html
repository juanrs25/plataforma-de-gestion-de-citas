<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Sistema de Notas</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light vh-100 d-flex align-items-center justify-content-center">

    <div class="container">
        <div class="row justify-content-center">
            <div class="col-12 col-sm-8 col-md-6 col-lg-4">
                
                <div class="card shadow rounded-4 border-0 p-4">
                    <div class="card-body text-center">
                        
                        <h2 class="mb-4 text-primary fw-bold">Bienvenido</h2>
                        <p class="text-muted mb-4">Ingresa tus credenciales para continuar</p>
                        
                        <form>
                            <div class="mb-3 text-start">
                                <label for="email" class="form-label fw-semibold">Correo Electrónico</label>
                                <input type="email" class="form-control" id="email" placeholder="usuario@correo.com" required>
                            </div>
                            <div class="mb-4 text-start">
                                <label for="password" class="form-label fw-semibold">Contraseña</label>
                                <input type="password" class="form-control" id="password" placeholder="********" required>
                            </div>
                            
                            <button type="submit" class="btn btn-primary w-100 fw-bold py-2">Iniciar Sesión</button>
                        </form>

                        <div class="mt-4 pt-3 border-top">
                            <small class="text-muted">Servicio de Autenticación - Taller 3</small>
                        </div>

                    </div>
                </div>

            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
