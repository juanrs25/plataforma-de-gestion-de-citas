services:

  # API GATEWAY

  gateway:
    build: ./Servicio-gateway
    ports:
      - "5000:5000"
    depends_on:
      - autenticacion
      - citas

  # SERVICIO AUTENTICACION

  autenticacion:
    build: ./Servicio-autenticacion
    ports:
      - "5001:5000"
    depends_on:
      - db_autenticacion
    env_file:
      - .env

  db_autenticacion:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: ${AUTH_MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${AUTH_MYSQL_DATABASE}
    ports:
      - "3307:3306"
    volumes:
      - db_auth_data:/var/lib/mysql

  # SERVICIO CITAS

  citas:
    build: ./Servicio-citas
    ports:
      - "5002:5000"
    depends_on:
      - db_citas
    env_file:
      - .env

  db_citas:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: ${CITA_MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${CITA_MYSQL_DATABASE}
    ports:
      - "3308:3306"
    volumes:
      - db_citas_data:/var/lib/mysql

volumes:
  db_auth_data:
  db_citas_data:
