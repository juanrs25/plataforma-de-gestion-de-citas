<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Login - Entidad de Salud</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<style>
body {
  background: url("https://img.freepik.com/free-vector/abstract-medical-background-with-blue-hexagons_1017-19366.jpg") no-repeat center center fixed;
  background-size: cover;
}

.container-login {
  max-width: 400px;
  margin: 80px auto;
  padding: 30px;
  background: rgba(255,255,255,0.95);
  border-radius: 12px;
  box-shadow: 0px 4px 12px rgba(0,0,0,0.2);
}

h2 {
  text-align: center;
  font-weight: bold;
  color: #0d6efd; 
}

.logo {
  display: block;
  margin: 0 auto 20px auto;
  width: 100px;
  height: 100px;
}
.footer {
  text-align: center;
  margin-top: 20px;
  font-size: 12px;
  color: #555;
}
</style>
</head>
<body>
  <div class="container-login">
    <!-- Logo de la entidad -->
    <img src="https://cdn-icons-png.flaticon.com/512/2966/2966481.png" alt="Logo Salud" class="logo">

    <h2>Login a nuestro coso de citas</h2>

    <!-- Formulario de login -->
    <form action="#" method="post">
      <div class="mb-3">
        <label for="usuario" class="form-label text-primary fw-bold">Usuario</label>
        <input type="text" class="form-control" id="usuario" name="usuario" placeholder="Ingrese su usuario" required>
      </div>

      <div class="mb-3">
        <label for="password" class="form-label text-primary fw-bold">Contraseña</label>
        <input type="password" class="form-control" id="password" name="password" placeholder="Ingrese su contraseña" required>
      </div>

      <button type="submit" class="btn btn-primary w-100">Ingresar</button>
    </form>

    <!-- links -->
   <div class="text-center mt-3">
  <a href="#" class="small text-decoration-none">¿Olvidó su contraseña?</a><br>
  <a href="registro.html" class="small text-decoration-none">Registrarse como paciente</a>
</div>

 
    <div class="footer">
      © 2026 - Entidad de Salud
    </div>
  </div>


<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
