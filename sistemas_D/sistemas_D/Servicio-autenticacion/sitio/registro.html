<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Registro - Entidad de Salud</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body {
      background: url("https://img.freepik.com/free-vector/blue-gradient-background_53876-60238.jpg") no-repeat center center fixed;
      background-size: cover;
    }
    .container-registro {
      max-width: 500px;
      margin: 60px auto;
      padding: 30px;
      background: rgba(255,255,255,0.95);
      border-radius: 12px;
      box-shadow: 0px 4px 12px rgba(0,0,0,0.2);
    }
    h2 {
      text-align: center;
      color: #0d6efd;
      font-weight: bold;
    }
  </style>
</head>
<body>
  <div class="container-registro">
    <h2>Registro de Paciente</h2>
    <form action="#" method="post">
      <div class="mb-3">
        <label class="form-label text-primary fw-bold">Nombre completo</label>
        <input type="text" class="form-control" name="nombre" required>
      </div>
      <div class="mb-3">
        <label class="form-label text-primary fw-bold">Correo electrónico</label>
        <input type="email" class="form-control" name="email" required>
      </div>
      <div class="mb-3">
        <label class="form-label text-primary fw-bold">Contraseña</label>
        <input type="password" class="form-control" name="password" required>
      </div>
      <button type="submit" class="btn btn-primary w-100">Registrarse</button>
    </form>
    <div class="text-center mt-3">
      <a href="login.html" class="small text-decoration-none">Volver al login</a>
    </div>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
